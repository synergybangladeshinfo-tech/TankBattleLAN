# Builds the Android APK in the cloud - no local Unity or Unity Hub needed on your PC.
#
# Unity discontinued browser-based manual license activation for Personal licenses
# in 2023, so this workflow activates the license entirely on the runner using
# RageAgainstThePixel's actions (actively maintained, MIT licensed) instead of the
# old game-ci .ulf-file flow, which would otherwise require running Unity Hub
# locally just to generate a license file.
#
# Requires repo secrets: UNITY_EMAIL, UNITY_PASSWORD (your Unity ID login).
name: Build Android APK

on:
  workflow_dispatch:      # run manually from the Actions tab
  push:
    branches: [ main ]

jobs:
  build:
    name: Build APK
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Unity Editor + Android module
        uses: RageAgainstThePixel/unity-setup@v2
        id: unity-setup
        with:
          unity-version: '6000.0.x'
          build-targets: Android
          modules: android
          cache-installation: true

      - name: Activate Unity Personal license
        uses: RageAgainstThePixel/activate-unity-license@v2
        with:
          license: 'Personal'
          username: ${{ secrets.UNITY_EMAIL }}
          password: ${{ secrets.UNITY_PASSWORD }}

      - name: Generate project and build APK
        uses: RageAgainstThePixel/unity-action@v3
        with:
          build-target: Android
          log-name: build
          args: >-
            -quit -batchmode -nographics
            -executeMethod TankBattle.EditorTools.CiBuild.Build
            -customBuildPath build/Android/TankBattleLAN.apk
            -logFile -

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: TankBattleLAN-APK
          path: build/Android
